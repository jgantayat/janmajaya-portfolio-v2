<section id="certifications" class="section">
  <div class="container">
    <div appRevealOnScroll>
      <app-section-title
        title="Certifications"
        label="certifications"
        subtitle="Verified skills and credentials."
      />
    </div>

    <div class="cert-grid">
      @for (cert of certs; track cert.name; let i = $index) {
        <article class="cert-card card" appRevealOnScroll [revealDelay]="i * 80">

          @if (cert.verifyUrl) {
            <a
              [href]="cert.verifyUrl"
              target="_blank"
              rel="noopener"
              class="cert-image-link"
              [attr.aria-label]="'View credential for ' + cert.name"
            >
              <img
                [ngSrc]="cert.imageUrl ?? ''"
                [alt]="cert.name + ' certificate'"
                width="800"
                height="500"
                loading="lazy"
                class="cert-image"
              />
            </a>
          } @else if (cert.imageUrl) {
            <img
              [ngSrc]="cert.imageUrl"
              [alt]="cert.name + ' certificate'"
              width="800"
              height="500"
              loading="lazy"
              class="cert-image"
            />
          }

          <div class="cert-info">
            <h3 class="cert-name">{{ cert.name }}</h3>
            <span class="cert-issuer mono">{{ cert.issuer }}</span>
            @if (cert.verifyUrl) {
              <a
                [href]="cert.verifyUrl"
                target="_blank"
                rel="noopener"
                class="verify-link mono"
              >verify ↗</a>
            }
          </div>

        </article>
      }
    </div>
  </div>
</section>
