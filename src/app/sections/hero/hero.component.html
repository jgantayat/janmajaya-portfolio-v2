<section id="hero" class="hero">
  <canvas #matrixCanvas class="matrix-canvas" aria-hidden="true"></canvas>

  <div class="hero-overlay" aria-hidden="true"></div>

  <div class="container hero-content">
    <div class="hero-grid">

      <div class="hero-text" appRevealOnScroll>

        <div class="hero-greeting mono">
          <span class="greeting-bracket">&gt; </span>Hello, I'm
        </div>

        <h1 class="hero-name">
          {{ firstName() }}<br>
          <span class="accent-name">{{ lastName() }}</span>
        </h1>

        <div class="hero-role">
          <span class="mono role-prefix accent">// </span>
          <span class="typewriter mono">{{ displayedText() }}<span class="cursor" [class.blink]="!isDeleting()">|</span></span>
        </div>

        <p class="hero-tagline">{{ info.tagline }}</p>

        <div class="hero-actions">
          <button type="button" class="btn-primary" (click)="goToProjects()">
            View My Work
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
          <a class="btn-secondary" [href]="info.resumeUrl" download aria-label="Download resume">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Resume
          </a>
        </div>

        <div class="hero-socials">
          <a [href]="info.github" target="_blank" rel="noopener" class="social-link" aria-label="GitHub profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/>
            </svg>
          </a>
          <a [href]="info.linkedIn" target="_blank" rel="noopener" class="social-link" aria-label="LinkedIn profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/>
              <rect x="2" y="9" width="4" height="12"/>
              <circle cx="4" cy="4" r="2"/>
            </svg>
          </a>
          <a [href]="'mailto:' + info.email" class="social-link" aria-label="Send an email">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </a>
        </div>

      </div>

      <div class="hero-photo" appRevealOnScroll [revealDelay]="200">
        <div class="photo-frame">
          <img
            ngSrc="assets/janmajaya.png"
            width="600"
            height="500"
            priority
            alt="Janmajaya Gantayat"
            class="avatar-img"
          />
        </div>
      </div>

    </div>

    @for (idx of [quoteIndex()]; track idx) {
      <p class="hero-quote">
        <span class="quote-text mono">{{ quotes[idx] }}</span>
      </p>
    }
  </div>

  <div class="scroll-indicator" aria-hidden="true">
    <div class="scroll-line"></div>
    <span class="mono">scroll</span>
  </div>
</section>
